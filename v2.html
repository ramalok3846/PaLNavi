<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalNavi - 스마트 경로 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #111; }
        
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; transition: filter 0.5s ease; }
        
        /* 3D Pitch Mode */
        .map-3d-mode {
            transform: rotateX(60deg) scale(1.5);
            transform-origin: bottom center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .light-theme .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .light-theme .text-white { color: #222 !important; }
        .light-theme .text-gray-400 { color: #666 !important; }
        .light-theme input, .light-theme select { background: #f0f0f0; color: #222; border: 1px solid #ddd; }

        /* UI Animations */
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        .slide-down { animation: slideDown 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .hidden-panel { transform: translateY(-150%) !important; transition: transform 0.5s ease; }
        .hidden-bottom { transform: translateY(150%) !important; transition: transform 0.5s ease; }

        /* Custom Map Controls */
        .map-controls { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { 
            width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: all 0.2s;
        }
        .control-btn:active { transform: scale(0.9); }
        .active-3d { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .active-traffic { background: #10b981 !important; color: white !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .active-cctv { background: #ef4444 !important; color: white !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .active-incident { background: #f59e0b !important; color: white !important; box-shadow: 0 0 15px rgba(245, 158, 11, 0.6); }

        /* Dashboard */
        #nav-dashboard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; display: none; }
        
        #warning-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.3); z-index: 9998;
            pointer-events: none; display: none;
            animation: flash 0.5s infinite alternate;
        }
        @keyframes flash { from { opacity: 0.2; } to { opacity: 0.6; } }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
        .leaflet-control-attribution { display: none !important; }
        .pulse-marker { background: #3b82f6; border-radius: 50%; animation: pulse 2s infinite; border: 3px solid white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); } 70% { box-shadow: 0 0 0 20px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
    </style>
</head>
<body class="dark-theme text-white">

    <div id="map-container" style="width: 100%; height: 100%; position: absolute; perspective: 1000px;"><div id="map"></div></div>
    <div id="warning-overlay"></div>

    <!-- Top Search Panel -->
    <div id="search-panel" class="absolute top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-[400px] z-[1000] glass-panel rounded-2xl p-4 transition-transform duration-500">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent"><i class="fa-solid fa-location-arrow mr-2"></i>PalNavi</h1>
            <div id="theme-status-icon" class="text-xl w-8 h-8 flex items-center justify-center rounded-full text-blue-400"><i class="fa-solid fa-circle-half-stroke"></i></div>
        </div>
        
        <div class="space-y-3">
            <div class="relative">
                <i class="fa-solid fa-circle-dot absolute left-3 top-3 text-blue-400 text-sm"></i>
                <input type="text" id="start-input" placeholder="출발지 입력 (예: 서울시청)" class="w-full bg-gray-800 text-white rounded-xl py-2 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button id="my-loc-btn" class="absolute right-3 top-2.5 text-gray-400 hover:text-blue-400"><i class="fa-solid fa-crosshairs"></i></button>
            </div>
            <div id="waypoints-container" class="space-y-3 hidden"></div>
            <div class="relative">
                <i class="fa-solid fa-location-dot absolute left-3 top-3 text-red-400 text-sm"></i>
                <input type="text" id="end-input" placeholder="도착지 입력 (예: 부산역)" class="w-full bg-gray-800 text-white rounded-xl py-2 pl-10 pr-4 outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>
        </div>
        <div class="flex gap-2 mt-4">
            <button id="add-waypoint-btn" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-sm font-medium transition"><i class="fa-solid fa-plus mr-1"></i> 경유지</button>
            <button id="search-btn" class="flex-[2] bg-blue-600 hover:bg-blue-500 py-2 rounded-xl text-sm font-bold transition shadow-lg shadow-blue-600/30">경로 찾기</button>
        </div>
    </div>

    <!-- Map Controls -->
    <div class="map-controls">
        <div id="btn-3d" class="glass-panel control-btn" title="3D 뷰 전환"><i class="fa-solid fa-cube"></i></div>
        <div id="target-btn" class="glass-panel control-btn" title="내 위치"><i class="fa-solid fa-crosshairs"></i></div>
        <div id="traffic-toggle" class="glass-panel control-btn" title="교통 정보"><i class="fa-solid fa-car-side"></i></div>
        <div id="incident-toggle" class="glass-panel control-btn" title="고속도로 돌발/사고 정보"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div id="cctv-toggle" class="glass-panel control-btn" title="CCTV 보기"><i class="fa-solid fa-video"></i></div>
        <div id="layer-toggle" class="glass-panel control-btn" title="위성/일반 지도"><i class="fa-solid fa-layer-group"></i></div>
    </div>

    <!-- Navigation Dashboard -->
    <div id="nav-dashboard" class="glass-panel rounded-2xl p-4 slide-down">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-gray-400 text-xs font-bold mb-1">현재 속도</div>
                <div class="flex items-end"><span id="current-speed" class="text-4xl font-black text-white">0</span><span class="text-lg text-gray-400 ml-1 mb-1">km/h</span></div>
            </div>
            <div class="flex gap-3">
                <div id="speed-limit-badge" class="w-16 h-16 rounded-full border-4 border-red-500 bg-white flex flex-col items-center justify-center shadow-lg hidden">
                    <span class="text-black font-black text-xl leading-none" id="limit-text">50</span>
                </div>
            </div>
        </div>
        <div id="sim-speed-control" class="mt-3 flex items-center justify-between bg-gray-800 p-2 rounded-lg border border-gray-700">
            <span class="text-xs text-gray-400 font-bold">모의 주행 속도</span>
            <input type="range" id="sim-speed-slider" min="1" max="5" value="1" step="0.5" class="w-1/2 accent-blue-500">
            <span id="sim-speed-label" class="text-sm font-bold text-blue-400">1.0x</span>
        </div>
        <div class="mt-3 bg-gray-800 rounded-lg p-3 flex justify-between items-center border border-gray-700">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-arrow-turn-up fa-rotate-90 text-2xl text-blue-400" id="turn-icon"></i>
                <div><div class="text-xl font-bold" id="next-dist">0m</div><div class="text-sm text-gray-400" id="next-instruction">경로를 탐색하세요</div></div>
            </div>
        </div>
        <button id="stop-nav-btn" class="w-full mt-3 bg-red-600 hover:bg-red-500 py-2 rounded-xl text-sm font-bold transition shadow-lg shadow-red-600/30">안내 종료</button>
    </div>

    <!-- Bottom Result Panel -->
    <div id="result-panel" class="absolute bottom-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-[400px] z-[1000] glass-panel rounded-2xl p-5 transition-transform duration-500 hidden-bottom">
        <div class="flex bg-gray-800 p-1 rounded-xl mb-4">
            <button class="transport-tab flex-1 py-2 rounded-lg text-sm font-bold bg-blue-600 text-white shadow" data-type="car"><i class="fa-solid fa-car mr-1"></i>자동차</button>
            <button class="transport-tab flex-1 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white transition" data-type="bike"><i class="fa-solid fa-bicycle mr-1"></i>자전거</button>
            <button class="transport-tab flex-1 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white transition" data-type="walk"><i class="fa-solid fa-person-walking mr-1"></i>도보</button>
        </div>
        <div class="flex justify-between items-end mb-4">
            <div>
                <div class="text-gray-400 text-sm mb-1" id="route-summary">최적 경로 계산됨</div>
                <div class="flex items-baseline gap-2"><span id="est-time" class="text-4xl font-black text-blue-400">0분</span><span id="est-dist" class="text-lg font-medium text-gray-300">0km</span></div>
                <div class="text-sm text-gray-400 mt-1"><i class="fa-regular fa-clock mr-1"></i>도착 예정 <span id="arrival-time" class="text-white font-bold">00:00</span></div>
            </div>
            <div class="flex gap-2">
                <button id="start-real-nav-btn" class="bg-blue-500 hover:bg-blue-400 text-white px-4 py-3 rounded-xl font-bold shadow-lg transition flex flex-col items-center justify-center flex-1"><i class="fa-solid fa-car mb-1"></i>실제 주행</button>
                <button id="start-nav-btn" class="bg-green-500 hover:bg-green-400 text-black px-4 py-3 rounded-xl font-bold shadow-lg transition flex flex-col items-center justify-center flex-1"><i class="fa-solid fa-play mb-1"></i>모의 주행</button>
            </div>
        </div>
    </div>

    <div id="toast" class="glass-panel text-white px-6 py-3 rounded-full shadow-2xl font-medium text-sm"></div>
    <div id="admin-trigger" class="fixed bottom-0 right-0 w-20 h-20 z-[9999] bg-transparent cursor-default"></div>

    <div id="password-modal" class="fixed inset-0 bg-black/80 z-[10000] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="glass-panel p-6 rounded-2xl w-[300px] text-center">
            <h2 class="text-xl font-bold mb-4 text-white"><i class="fa-solid fa-lock mr-2"></i>관리자 인증</h2>
            <input type="password" id="admin-pw-input" placeholder="비밀번호 입력" class="w-full bg-gray-800 text-center text-white rounded-xl py-2 px-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button id="pw-cancel-btn" class="flex-1 bg-gray-600 py-2 rounded-xl text-white">취소</button>
                <button id="pw-submit-btn" class="flex-1 bg-blue-600 py-2 rounded-xl text-white font-bold">확인</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="admin-panel" class="fixed inset-0 bg-black/80 z-[10000] flex items-center justify-center hidden backdrop-blur-sm overflow-y-auto">
        <div class="glass-panel p-6 rounded-2xl w-[450px] my-10 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-white"><i class="fa-solid fa-user-shield mr-2 text-blue-400"></i>관리자 설정</h2>
                <button id="admin-close-btn" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="mb-4 bg-gray-800/50 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm text-yellow-400 mb-2 font-bold"><i class="fa-solid fa-sun mr-1"></i>테마 모드 설정</label>
                <select id="theme-select" class="w-full bg-gray-800 text-white rounded-xl py-2 px-3 outline-none focus:ring-2 focus:ring-yellow-500 text-sm">
                    <option value="auto">일출/일몰 자동 설정 (SunCalc 적용)</option>
                    <option value="light">항상 주간 (Light Mode)</option>
                    <option value="dark">항상 야간 (Dark Mode)</option>
                </select>
            </div>

            <div class="mb-4 bg-gray-800/50 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm text-blue-300 mb-2 font-bold"><i class="fa-solid fa-camera mr-1"></i>경찰청 단속카메라 연동 (택 1)</label>
                <input type="text" id="police-api-key-input" placeholder="공공데이터포털 API 키 입력 (선택)" class="w-full bg-gray-900 text-white rounded-lg py-2 px-3 mb-2 outline-none border border-gray-600 text-xs">
                <div class="flex gap-2 mb-3">
                    <button id="fetch-police-api-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg text-white text-xs font-bold transition"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>API로 전국 데이터 로드</button>
                </div>
                <div class="text-center text-gray-500 text-xs mb-2">- 또는 -</div>
                <input type="file" id="csv-upload" accept=".csv" class="w-full text-white text-xs mb-2 file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-bold file:bg-gray-700 file:text-white hover:file:bg-gray-600">
                <div id="csv-status" class="text-xs text-gray-400 font-medium">등록된 데이터 없음 (가상 카메라 작동 중)</div>
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1 font-bold">1. 한국도로공사(EX) API 키</label>
                <input type="text" id="ex-api-key-input" placeholder="발급받은 EX 돌발정보 API 키" class="w-full bg-gray-800 text-white rounded-xl py-2 px-3 mb-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                
                <label class="block text-sm text-gray-400 mb-1 font-bold">2. ITS 국가교통정보센터 API 키</label>
                <input type="text" id="its-api-key-input" placeholder="발급받은 ITS CCTV API 키" class="w-full bg-gray-800 text-white rounded-xl py-2 px-3 mb-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                
                <div class="flex gap-2">
                    <button id="save-key-btn" class="flex-[2] bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-white text-sm font-bold transition">전체 설정 저장</button>
                    <button id="delete-key-btn" class="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-white text-sm font-bold transition">초기화</button>
                </div>
            </div>
            
            <hr class="border-gray-700 mb-4">
            <div>
                <input type="password" id="new-pw-input" placeholder="새 관리자 비밀번호" class="w-full bg-gray-800 text-white rounded-xl py-2 px-3 mb-2 outline-none focus:ring-2 focus:ring-green-500 text-sm">
                <button id="change-pw-btn" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded-lg text-white text-sm font-bold transition">비밀번호 변경</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <script>
        // ★ 변수 초기화 ★
        let adminPassword = "1111";
        let itsApiKey = localStorage.getItem('itsApiKey') || ""; 
        let exApiKey = localStorage.getItem('exApiKey') || ""; 
        let policeApiKey = localStorage.getItem('policeApiKey') || ""; 
        let themeSetting = localStorage.getItem('themeSetting') || "auto"; 
        
        let actualCameras = []; 
        let myLocationMarker = null, lastKnownLat = 37.5665, lastKnownLon = 126.9780, isWatchingLocation = false;
        
        let isNavigating = false, is3DMode = false, showLiveCCTV = false, showTraffic = false, showIncidents = false;
        let routeCoords = [], pois = [], simInterval = null, simIndex = 0, simSpeed = 0, simSpeedMultiplier = 1.0, currentMode = 'car';
        let currentDriveMode = 'mock', realDriveWatchId = null;

        document.getElementById('theme-select').value = themeSetting;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg; toast.style.display = 'block'; toast.classList.add('slide-up');
            setTimeout(() => {
                toast.classList.remove('slide-up'); toast.classList.add('slide-down');
                setTimeout(() => { toast.style.display = 'none'; toast.classList.remove('slide-down'); }, 400);
            }, 3000);
        }

        const speak = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'ko-KR'; utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        };

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // CSV 업로드 (경찰청 데이터)
        function parseCSVLine(line) {
            const result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes; else if (char === ',' && !inQuotes) { result.push(current); current = ''; } else current += char;
            }
            result.push(current); return result;
        }

        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const lines = evt.target.result.split(/\r?\n/);
                if(lines.length < 2) return;
                const headers = parseCSVLine(lines[0]).map(h => h.trim());
                const idxType = headers.indexOf('단속구분'), idxLimit = headers.indexOf('제한속도'), idxZone = headers.indexOf('보호구역구분'), idxLat = headers.indexOf('위도'), idxLon = headers.indexOf('경도');
                
                if (idxLat === -1) return showToast("CSV 헤더 오류");
                actualCameras = [];
                for(let i=1; i<lines.length; i++) {
                    const cols = parseCSVLine(lines[i]); if(cols.length < Math.max(idxLat, idxLon)) continue;
                    const lat = parseFloat(cols[idxLat]), lon = parseFloat(cols[idxLon]);
                    if(!isNaN(lat) && !isNaN(lon)) actualCameras.push({ lat, lon, type: parseInt(cols[idxType]) || 1, limit: parseInt(cols[idxLimit]) || 50, zone: parseInt(cols[idxZone]) || 99 });
                }
                document.getElementById('csv-status').innerHTML = `<span class="text-green-400">CSV 성공: ${actualCameras.length.toLocaleString()}건 매칭</span>`;
                showToast(`카메라 데이터 적용 완료!`);
            };
            reader.readAsText(file, 'euc-kr'); 
        });

        // 공공데이터포털(경찰청) API 연동 기능
        document.getElementById('fetch-police-api-btn').addEventListener('click', async () => {
            const key = document.getElementById('police-api-key-input').value.trim();
            if(!key) return showToast("공공데이터포털 API 키를 먼저 입력해주세요.");
            
            showToast("전국 카메라 데이터를 불러옵니다. (최대 10초 소요)");
            try {
                const url = `https://api.odcloud.kr/api/15012636/v1/uddi:71891823-1463-4418-8f83-8a356db6bb01?page=1&perPage=50000&serviceKey=${encodeURIComponent(key)}`;
                const response = await fetch(url);
                const text = await response.text();
                
                if (text.includes("OpenAPI") || text.includes("<")) {
                    showToast("공공데이터 API 서버 응답 에러 또는 트래픽 초과입니다.");
                    return;
                }
                
                let data;
                try { data = JSON.parse(text); } catch (e) { throw new Error("JSON 파싱 에러"); }
                
                if(data && data.data) {
                    actualCameras = data.data.map(item => ({
                        lat: parseFloat(item['위도']),
                        lon: parseFloat(item['경도']),
                        type: parseInt(item['단속구분']) || 1,
                        limit: parseInt(item['제한속도']) || 50,
                        zone: parseInt(item['보호구역구분']) || 99
                    })).filter(c => !isNaN(c.lat) && !isNaN(c.lon));

        async function fetchRealCCTV() {
            if(!itsApiKey) return;
            const bounds = map.getBounds();
            const minX = bounds.getWest().toFixed(5), maxX = bounds.getEast().toFixed(5), minY = bounds.getSouth().toFixed(5), maxY = bounds.getNorth().toFixed(5);
            const url = `https://openapi.its.go.kr:9443/cctvInfo?apiKey=${itsApiKey}&type=all&cctvType=1&minX=${minX}&maxX=${maxX}&minY=${minY}&maxY=${maxY}&getType=xml`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                if (text.includes("초과하였습니다")) { showToast("🚨 일일 트래픽(1000회) 초과!"); return; }

                const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
                const dataNodes = Array.from(xmlDoc.getElementsByTagName("data"));
                if(dataNodes.length === 0) return;

                liveCctvGroup.clearLayers();
                dataNodes.forEach(node => {
                    const coordx = parseFloat(node.getElementsByTagName("coordx")[0]?.textContent || 0);
                    const coordy = parseFloat(node.getElementsByTagName("coordy")[0]?.textContent || 0);
                    let cctvurl = node.getElementsByTagName("cctvurl")[0]?.textContent;
                    if(coordx === 0 || coordy === 0 || !cctvurl) return;
                    if (cctvurl.startsWith("http://")) cctvurl = cctvurl.replace("http://", "https://");

                    const icon = L.divIcon({ className: '', html: '<div style="background-color: #ef4444; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);"><i class="fa-solid fa-video" style="font-size: 13px;"></i></div>', iconSize:[28,28], iconAnchor:[14,14] });
                    const marker = L.marker([coordy, coordx], {icon}).addTo(liveCctvGroup);
                    marker.bindPopup(`<div style="background-color: #111827; padding: 12px; border-radius: 8px; width: 320px;"><div style="font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; color: #ffffff !important;"><span style="width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 2s infinite;"></span> ${node.getElementsByTagName("cctvname")[0]?.textContent || "CCTV"}</div><video class="cctv-video" style="width: 100%; height: 200px; object-fit: cover; border-radius: 4px; background-color: #000;" controls autoplay muted playsinline></video></div>`, { maxWidth: 350 });
                    marker.on('popupopen', (e) => {
                        const videoElement = e.popup._contentNode.querySelector('.cctv-video');
                        if (Hls.isSupported() && cctvurl.includes('.m3u8')) {
                            const hls = new Hls(); hls.loadSource(cctvurl); hls.attachMedia(videoElement);
                            hls.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play().catch(()=>{}));
                        } else { videoElement.src = cctvurl; videoElement.play().catch(()=>{}); }
                    });
                });
            } catch (e) { console.error("fetchRealCCTV 에러:", e); }
        }

        // Nominatim OpenStreetMap
        async function getCoordinates(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const text = await res.text();
                let data;

        // 경로 검색 및 OSRM
        document.getElementById('search-btn').addEventListener('click', async () => {
            const startQuery = document.getElementById('start-input').value; const endQuery = document.getElementById('end-input').value;
            const wpQueries = Array.from(document.querySelectorAll('.wp-input')).map(i => i.value).filter(v => v.trim() !== "");
            if (!startQuery || !endQuery) return showToast("출발지와 도착지를 모두 입력해주세요.");

            showToast("경로 탐색 및 데이터 매칭 중...");
            routeGroup.clearLayers(); poiGroup.clearLayers(); pois = [];

            const startCoords = await getCoordinates(startQuery), endCoords = await getCoordinates(endQuery);
            if (!startCoords || !endCoords) return showToast("장소를 찾을 수 없습니다.");

            let coordsString = `${startCoords[0]},${startCoords[1]}`;
            for(let q of wpQueries) {
                const c = await getCoordinates(q); if(c) { coordsString += `;${c[0]},${c[1]}`; L.marker([c[1], c[0]], {icon: L.divIcon({html: '🚩', className: 'text-2xl'})}).addTo(routeGroup); }
            }
            coordsString += `;${endCoords[0]},${endCoords[1]}`;

            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`);
                const text = await res.text();
                
                let data;
                try { data = JSON.parse(text); } catch (e) { throw new Error("OSRM 경로 JSON 파싱 에러"); }

                if (data && data.code === 'Ok') {
                    routeCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    let totalDistMeters = data.routes[0].distance; drawRouteWithTraffic(); map.fitBounds(L.polyline(routeCoords).getBounds(), { padding: [50, 50] });

                    if(actualCameras.length > 0) {
                        actualCameras.forEach(cam => {
                            for(let r=0; r<routeCoords.length; r+=2) {
                                if(getDistance(cam.lat, cam.lon, routeCoords[r][0], routeCoords[r][1]) < 50) {
                                    let bg = cam.zone === 1 || cam.zone === 2 ? '#f59e0b' : 'white', border = cam.zone === 1 || cam.zone === 2 ? '#d97706' : 'red', color = cam.zone === 1 || cam.zone === 2 ? 'white' : 'black';
                                    let typeHtml = cam.type === 2 ? '<div style="font-size:8px; color:red; margin-bottom:-4px;">신호</div>' : '';
                                    const icon = L.divIcon({ html: `<div style="background:${bg}; border:3px solid ${border}; border-radius:50%; width:28px; height:28px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:bold; color:${color}; font-size:11px;">${typeHtml}<div>${cam.limit}</div></div>`, iconSize: [28,28], iconAnchor: [14,14] });
                                    L.marker([cam.lat, cam.lon], {icon}).addTo(poiGroup);
                                    pois.push({ type: 'actual', index: r, limit: cam.limit, camType: cam.type, zone: cam.zone, active: true });
                                    break;
                                }
                            }
                        });
                    }

                    const speedMs = currentMode === 'car' ? 16.6 : (currentMode === 'bike' ? 4.1 : 1.33);
                    const totalSeconds = totalDistMeters / speedMs; const mins = Math.floor(totalSeconds / 60);
                    document.getElementById('est-time').innerText = Math.floor(mins / 60) > 0 ? `${Math.floor(mins / 60)}시간 ${mins % 60}분` : `${mins % 60}분`;
                    document.getElementById('est-dist').innerText = (totalDistMeters / 1000).toFixed(1) + 'km';
                    const now = new Date(); now.setSeconds(now.getSeconds() + totalSeconds);
                    document.getElementById('arrival-time').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            } catch (err) { showToast("경로 탐색 통신에 실패했습니다."); }
        });

        function driveStep() {
            if (simIndex >= routeCoords.length - 1) return document.getElementById('stop-nav-btn').click();
            const curr = routeCoords[simIndex], next = routeCoords[simIndex + 1];
            
            let targetSpeed = currentMode === 'car' ? 60 : 20, limitSpeed = 999;
            pois.forEach(p => {
                if(p.active && p.index > simIndex && p.index - simIndex < 15) {

                    if(p.index - simIndex === 14) {
                        let msg = "";
                        if(p.type === 'actual') {
                            if(p.zone === 1) msg += "어린이 보호구역입니다. "; else if(p.zone === 2) msg += "노인 보호구역입니다. ";
                            msg += `${p.limit}킬로미터 ${p.camType === 2 ? '신호 및 ' : ''}과속 단속 구간입니다.`;
                        } else msg = `${p.limit}킬로미터 과속 단속 구간입니다.`;
                        speak(msg);
                    }
                    if(p.index === simIndex) p.active = false;
                }
            });

            if(currentMode === 'car' && targetSpeed > limitSpeed) targetSpeed = limitSpeed - 5;
            targetSpeed += (Math.random() - 0.5) * 10; simSpeed += (Math.max(0, targetSpeed) - simSpeed) * 0.1;

            document.getElementById('current-speed').innerText = Math.round(simSpeed);
            const badge = document.getElementById('speed-limit-badge');
            
            if (limitSpeed !== 999) {
                badge.classList.remove('hidden'); document.getElementById('limit-text').innerText = limitSpeed;
                if (simSpeed > limitSpeed) { document.getElementById('warning-overlay').style.display = 'block'; if(Math.random() < 0.1) speak("속도 위반입니다."); } 
                else document.getElementById('warning-overlay').style.display = 'none';
            } else { badge.classList.add('hidden'); document.getElementById('warning-overlay').style.display = 'none'; }

            carMarker.setLatLng(next); const angle = Math.atan2(next[0] - curr[0], next[1] - curr[1]) * 180 / Math.PI;
            if (carMarker._icon.querySelector('div')) carMarker._icon.querySelector('div').style.transform = `rotate(${90 - angle}deg)`;

            map.setView(next, 18, {animate: false});
            if (is3DMode) document.getElementById('map').style.transform = `rotateX(60deg) scale(1.5) rotateZ(${90 + angle}deg)`;
            else document.getElementById('map').style.transform = '';

            const rSteps = routeCoords.length - simIndex;
            document.getElementById('next-dist').innerText = (rSteps * 10) > 1000 ? ((rSteps * 10)/1000).toFixed(1) + 'km' : (rSteps * 10) + 'm';
            document.getElementById('next-instruction').innerText = rSteps < 20 ? "목적지 부근입니다" : "경로를 따라 이동하세요";
            simIndex++;
        }
    </script>
</body>
</html>
